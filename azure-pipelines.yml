trigger:
- main

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'

stages:
- stage: CI
  displayName: 'Stage 1: CI - Integracion Continua'
  jobs:
  - job: BuildJob
    displayName: 'BuildJob - Compilar aplicacion'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 8'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
    - script: dotnet restore Calculadora.csproj
      displayName: 'Restaurar paquetes NuGet'
    - script: dotnet build Calculadora.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'Compilar aplicacion'

- stage: Testing
  displayName: 'Stage 2: Testing - Validacion'
  dependsOn: CI
  condition: succeeded()
  jobs:
  - job: TestJob
    displayName: 'TestJob - Ejecutar pruebas'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 8'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
    - script: dotnet test Calculadora.Tests/Calculadora.Tests.csproj --configuration $(buildConfiguration) --logger trx --results-directory $(Agent.TempDirectory)/TestResults
      displayName: 'Ejecutar pruebas unitarias'
    - task: PublishTestResults@2
      displayName: 'Publicar resultados de pruebas'
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/TestResults/*.trx'
        failTaskOnFailedTests: true
      condition: succeededOrFailed()

- stage: Delivery
  displayName: 'Stage 3: Delivery - Entrega'
  dependsOn: Testing
  condition: succeeded()
  jobs:
  - job: DeliveryJob
    displayName: 'DeliveryJob - Preparar entrega'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar SDK .NET 8'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'
    - script: dotnet publish Calculadora.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app
      displayName: 'Publicar aplicacion'
    - task: PublishPipelineArtifact@1
      displayName: 'Publicar artefacto del pipeline'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/app'
        artifact: 'Calculadora'
    - script: echo "Entrega preparada correctamente."
      displayName: 'Confirmar entrega'
